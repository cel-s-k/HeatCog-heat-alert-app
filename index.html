// ── Logic ──────────────────────────────────────────────────────────────────────

function getRequiredWashout(temps, i) {
  var spikeEnd = -1;
  for (var j = i-1; j >= 0; j--) { if (temps[j] > 27) { spikeEnd = j; break; } }
  if (spikeEnd === -1) return 0;
  var spikeStart = spikeEnd;
  while (spikeStart > 0 && temps[spikeStart-1] > 27) spikeStart--;
  var len = spikeEnd - spikeStart + 1;
  return len === 1 ? 2 : len === 2 ? 4 : 7;
}

function findWindows(weatherData, city) {
  if (!weatherData || !city) return [];
  var temps = weatherData.daily.temperature_2m_max;
  var dates = weatherData.daily.time;
  var cutoff = city.cutoff;
  var windows = [];
  var washouts = [];

  for (var i = 0; i < temps.length - 2; i++) {
    if (temps[i] >= cutoff && temps[i+1] >= cutoff) {
      var ws = i+2;
      if (ws >= temps.length || temps[ws] < cutoff) continue;
      var we = ws;
      while (we+1 < temps.length && temps[we+1] >= cutoff) we++;
      windows.push({type:'Hot', collectionStart:dates[ws], collectionEnd:dates[we], collectionDays:we-ws+1});
      i = we;
    }
  }

  for (var i = 0; i < temps.length; i++) {
    if (temps[i] >= cutoff) {
      var runEnd = i;
      while (runEnd+1 < temps.length && temps[runEnd+1] >= cutoff) runEnd++;
      var ed = new Date(dates[runEnd]); ed.setHours(0,0,0,0);
      var ws2 = new Date(ed); ws2.setDate(ws2.getDate()+1);
      var we2 = new Date(ed); we2.setDate(we2.getDate()+14);
      washouts.push({start:ws2, end:we2});
      i = runEnd;
    }
  }

  function inWashout(idx) {
    var d = new Date(dates[idx]); d.setHours(0,0,0,0);
    return washouts.some(function(p){ return d >= p.start && d <= p.end; });
  }

  for (var i = 0; i < temps.length; i++) {
    if (temps[i] >= 15 && temps[i] <= 25) {
      if (inWashout(i)) continue;
      var rw = getRequiredWashout(temps, i);
      var valid = false;
      if (rw === 0) {
        valid = true;
      } else {
        var spikeEnd = -1;
        for (var j = i-1; j >= 0; j--) { if (temps[j] > 27) { spikeEnd = j; break; } }
        valid = (i - spikeEnd - 1) >= rw;
      }
      if (valid) {
        var we = i;
        while (we+1 < temps.length && temps[we+1] >= 15 && temps[we+1] <= 25 && !inWashout(we+1)) we++;
        var inHot = windows.some(function(w){
          return w.type==='Hot' && new Date(dates[i]) >= new Date(w.collectionStart) && new Date(dates[i]) <= new Date(w.collectionEnd);
        });
        if (!inHot) {
          windows.push({type:'NotHot', collectionStart:dates[i], collectionEnd:dates[we], collectionDays:we-i+1});
          i = we;
        }
      }
    }
  }
  return windows.sort(function(a,b){ return new Date(a.collectionStart)-new Date(b.collectionStart); });
}

// ── Style helpers ──────────────────────────────────────────────────────────────

function tempBg(t, c) {
  if (t==null) return '#d1d5db';
  if (t > c) return '#ef4444';
  if (t >= 15 && t <= 25) return '#0d9488';
  if (t < 15) return '#bfdbfe';
  return '#fde047';
}
function tempBorder(t, c) {
  if (t==null) return '#9ca3af';
  if (t > c) return '#dc2626';
  if (t >= 15 && t <= 25) return '#0f766e';
  if (t < 15) return '#93c5fd';
  return '#facc15';
}

var MLONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MSHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtL(s){ var d=new Date(s); return MLONG[d.getMonth()]+' '+d.getDate(); }
function fmtS(s){ var d=new Date(s); return MSHORT[d.getMonth()]+' '+d.getDate(); }
function isToday(s){ var t=new Date(); t.setHours(0,0,0,0); var d=new Date(s); d.setHours(0,0,0,0); return d.getTime()===t.getTime(); }
function isFuture(s){ var t=new Date(); t.setDate(t.getDate()+1); t.setHours(0,0,0,0); var d=new Date(s); d.setHours(0,0,0,0); return d>=t; }

// ── App ────────────────────────────────────────────────────────────────────────

function App() {
  var _s = useState(null), city = _s[0], setCity = _s[1];
  var _q = useState(''), q = _q[0], setQ = _q[1];
  var _w = useState(null), wx = _w[0], setWx = _w[1];
  var _l = useState(false), loading = _l[0], setLoading = _l[1];
  var _e = useState(null), err = _e[0], setErr = _e[1];

  var filtered = CITIES.filter(function(c){
    return c.name.toLowerCase().indexOf(q.toLowerCase())>=0 || c.country.toLowerCase().indexOf(q.toLowerCase())>=0;
  });

  function pickCity(c) {
    setCity(c); setQ(''); setWx(null); setLoading(true); setErr(null);
    var url = 'https://api.open-meteo.com/v1/forecast?latitude='+c.lat+'&longitude='+c.lon+'&daily=temperature_2m_max&temperature_unit=celsius&timezone=auto&past_days=14&forecast_days=16';
    fetch(url).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){ setWx(d); }).catch(function(e){ setErr(e.message); }).finally(function(){ setLoading(false); });
  }

  var allWin = findWindows(wx, city);

  function typesForDate(dateStr) {
    var d = new Date(dateStr); d.setHours(0,0,0,0);
    return allWin.filter(function(w){
      var s=new Date(w.collectionStart); s.setHours(0,0,0,0);
      var e=new Date(w.collectionEnd); e.setHours(0,0,0,0);
      return d>=s && d<=e;
    }).map(function(w){ return w.type; });
  }

  // Build weeks
  function buildWeeks() {
    if (!wx) return [];
    var times = wx.daily.time, temps = wx.daily.temperature_2m_max;
    var si = Math.max(0, times.length-19);
    var days = [];
    for (var i=si; i<times.length; i++) {
      var dow = new Date(times[i]).getDay();
      days.push({date:times[i], temp:temps[i], dow: dow===0?6:dow-1});
    }
    var weeks=[], week=[];
    for (var i=0; i<days[0].dow; i++) week.push(null);
    days.forEach(function(day,idx){
      week.push(day);
      if (day.dow===6 || idx===days.length-1) { weeks.push(week); week=[]; }
    });
    return weeks;
  }
  var weeks = buildWeeks();

  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  var dispEnd = wx ? new Date(wx.daily.time[wx.daily.time.length-1]) : null;
  var dispStart = wx ? new Date(wx.daily.time[Math.max(0, wx.daily.time.length-19)]) : null;
  var alertWin = allWin.filter(function(w){
    if (!dispStart||!dispEnd) return false;
    var ws=new Date(w.collectionStart), we=new Date(w.collectionEnd);
    return we>=tomorrow && ws<=dispEnd && we>=dispStart && w.collectionDays>=2;
  });

  // ── Inline styles ────────────────────────────────────────────────────────────
  var S = {
    page:  {minHeight:'100vh', background:'linear-gradient(135deg,#eff6ff,#fff,#fff7ed)', padding:'16px', fontFamily:'system-ui,-apple-system,sans-serif'},
    wrap:  {maxWidth:'1200px', margin:'0 auto'},
    card:  {background:'#fff', borderRadius:'12px', boxShadow:'0 4px 24px rgba(0,0,0,.1)', padding:'24px', marginBottom:'24px'},
    row:   {display:'flex', alignItems:'center', gap:'12px', marginBottom:'24px'},
    h1:    {fontSize:'clamp(18px,4vw,28px)', fontWeight:'bold', color:'#1f2937', margin:0},
    sub:   {fontSize:'13px', color:'#6b7280', margin:0},
    srch:  {display:'flex', alignItems:'center', gap:'8px', border:'2px solid #d1d5db', borderRadius:'8px', padding:'10px 14px'},
    inp:   {flex:1, border:'none', outline:'none', fontSize:'16px', background:'transparent'},
    drop:  {position:'absolute', top:'100%', left:0, right:0, marginTop:'6px', background:'#fff', border:'2px solid #e5e7eb', borderRadius:'8px', boxShadow:'0 8px 24px rgba(0,0,0,.12)', maxHeight:'320px', overflowY:'auto', zIndex:10},
    ditem: {display:'block', width:'100%', textAlign:'left', padding:'10px 16px', background:'none', border:'none', borderBottom:'1px solid #f3f4f6', cursor:'pointer'},
    banner:{marginTop:'16px', padding:'14px 16px', background:'linear-gradient(90deg,#f0fdf4,#dcfce7)', borderRadius:'8px', borderLeft:'4px solid #16a34a', display:'flex', flexWrap:'wrap', gap:'12px', justifyContent:'space-between', alignItems:'center'},
    alert: {background:'linear-gradient(135deg,#f0fdf4,#dcfce7)', border:'2px solid #4ade80', borderRadius:'12px', padding:'20px 24px', marginBottom:'24px', boxShadow:'0 4px 16px rgba(0,0,0,.08)'},
    agrid: {display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))', gap:'12px'},
    acard: {background:'#fff', borderRadius:'8px', padding:'12px', boxShadow:'0 2px 8px rgba(0,0,0,.06)'},
    lgnd:  {display:'flex', flexWrap:'wrap', gap:'16px', marginBottom:'24px', fontSize:'12px'},
    dayHdr:{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'6px', marginBottom:'8px'},
    weekRow:{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'6px'},
    weeksWrap:{display:'flex', flexDirection:'column', gap:'6px'},
  };

  return h('div', {style:S.page},
    h('div', {style:S.wrap},

      // ── Header ──
      h('div', {style: Object.assign({}, S.card, {borderTop:'4px solid #16a34a'})},
        h('div', {style:S.row},
          h('span', {style:{fontSize:'28px'}}, '🔥'),
          h('div', null,
            h('h1', {style:S.h1}, 'HeatCog Data Collection Alert'),
            h('p',  {style:S.sub}, 'Track HOT and NOT-HOT data collection windows')
          )
        ),

        h('div', {style:{position:'relative'}},
          h('div', {style:S.srch},
            h('span', {style:{color:'#9ca3af', fontSize:'16px'}}, '🔍'),
            h('input', {type:'text', placeholder:'Search city or country…', value:q, onChange:function(ev){setQ(ev.target.value);}, style:S.inp})
          ),
          q && h('div', {style:S.drop},
            filtered.length===0 ? h('div', {style:{padding:'12px 16px', color:'#6b7280'}}, 'No cities found') :
            filtered.map(function(c){
              return h('button', {
                key: c.name+c.country,
                onClick: function(){ pickCity(c); },
                style: S.ditem,
                onMouseEnter: function(ev){ ev.currentTarget.style.background='#fff7ed'; },
                onMouseLeave: function(ev){ ev.currentTarget.style.background='none'; }
              },
                h('div', {style:{fontWeight:600, color:'#1f2937'}}, c.name),
                h('div', {style:{fontSize:'12px', color:'#6b7280'}}, c.country+' · Cutoff: '+c.cutoff+'°C')
              );
            })
          )
        ),

        city && h('div', {style:S.banner},
          h('div', null,
            h('p', {style:{fontWeight:'bold', fontSize:'16px', color:'#111', margin:'0 0 2px'}}, city.name+', '+city.country),
            h('p', {style:{fontSize:'13px', color:'#4b5563', margin:0}},
              'Hot threshold: ', h('b', {style:{color:'#dc2626'}}, city.cutoff+'°C'),
              ' | NotHot range: ', h('b', {style:{color:'#0f766e'}}, '15–25°C')
            )
          ),
          h('div', {style:{fontSize:'11px', fontWeight:'bold', background:'#fff', padding:'6px 12px', borderRadius:'20px', border:'1px solid #d1d5db'}},
            '🔥 Hot: 2+ days above cutoff | ☁️ Not-Hot: 15–25°C after washout | 14-day washout after Hot'
          )
        )
      ),

      // ── Loading ──
      loading && h('div', {style:Object.assign({},S.card,{textAlign:'center', color:'#6b7280', fontSize:'18px'})}, 'Loading weather data…'),

      // ── Error ──
      err && h('div', {style:{background:'#fef2f2', border:'2px solid #fca5a5', borderRadius:'12px', padding:'20px', color:'#b91c1c', marginBottom:'16px'}},
        h('b', null, 'Error: '), err),

      // ── Main ──
      wx && city && !loading && h('div', null,

        // Alert panel
        alertWin.length > 0 && h('div', {style:S.alert},
          h('div', {style:{display:'flex', gap:'12px', alignItems:'flex-start'}},
            h('span', {style:{fontSize:'24px', marginTop:'2px'}}, '🚨'),
            h('div', {style:{flex:1}},
              h('h2', {style:{fontWeight:'bold', fontSize:'18px', color:'#111', marginTop:0, marginBottom:'16px'}},
                'Active Data Collection Window'+(alertWin.length>1?'s':'')),
              h('div', {style:S.agrid},
                alertWin.map(function(w,i){
                  return h('div', {key:i, style:Object.assign({},S.acard,{borderLeft:'4px solid '+(w.type==='Hot'?'#ef4444':'#0d9488')})},
                    h('div', {style:{display:'flex', gap:'8px', alignItems:'flex-start'}},
                      h('span', {style:{fontSize:'20px'}}, w.type==='Hot'?'🔥📊':'☁️📊'),
                      h('div', null,
                        h('div', {style:{fontWeight:'bold', fontSize:'13px', color:'#111'}}, (w.type==='Hot'?'Hot':'Not-Hot')+' Collection'),
                        h('div', {style:{fontSize:'13px', fontWeight:600, color:'#374151'}}, fmtL(w.collectionStart)+' – '+fmtL(w.collectionEnd)),

                      )
                    )
                  );
                })
              )
            )
          )
        ),

        // Calendar
        h('div', {style:S.card},
          h('h2', {style:{fontWeight:'bold', fontSize:'22px', color:'#1f2937', marginTop:0, marginBottom:'20px'}}, '15-Day Temperature Forecast'),

          h('div', {style:S.lgnd},

             ['#fde047','Warm 25–'+city.cutoff+'°C — NO collect'],['#ef4444','Hot >'+city.cutoff+'°C — collect Hot 🔥'],['#d1d5db','No data']]
            .map(function(pair){
              return h('div', {key:pair[1], style:{display:'flex', alignItems:'center', gap:'6px'}},

          ),

          h('div', {style:S.dayHdr},

              return h('div', {key:d, style:{textAlign:'center', fontWeight:'bold', fontSize:'12px', color:'#4b5563', padding:'6px 0'}}, d);
            })
          ),

          h('div', {style:S.weeksWrap},
            weeks.map(function(week, wi){
              return h('div', {key:wi, style:S.weekRow},
                week.map(function(day, di){
                  if (!day) return h('div', {key:'e'+di, style:{aspectRatio:'1'}});
                  var t=day.temp, noData=t==null, cut=city.cutoff;
                  var tod=isToday(day.date), fut=isFuture(day.date);
                  var types=fut?typesForDate(day.date):[];
                  var noCollect=fut&&!noData&&types.length===0;

                  var ring='none';
                  if (types.indexOf('Hot')>=0) ring='0 0 0 3px #fb923c';
                  else if (types.indexOf('NotHot')>=0) ring='0 0 0 3px #0d9488';

                  return h('div', {key:day.date, style:{
