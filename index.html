<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeatCog Data Collection Alert</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg,#eff6ff,#fff,#fff7ed); min-height: 100vh; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 12px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.09); padding: 18px; margin-bottom: 18px; }
    .card-top { border-top: 4px solid #16a34a; }
    h1 { font-size: clamp(17px,4vw,26px); font-weight: 800; color: #1f2937; margin: 0; }
    h2 { font-size: clamp(15px,3vw,20px); font-weight: 700; color: #1f2937; margin: 0 0 16px; }
    .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .sub { font-size: 12px; color: #6b7280; margin: 0; }

    /* Search */
    .search-box { display: flex; align-items: center; gap: 8px; border: 2px solid #d1d5db; border-radius: 8px; padding: 9px 13px; background: #fff; }
    .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; min-width: 0; }
    .dropdown { position: absolute; top: 100%; left: 0; right: 0; margin-top: 5px; background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.12); max-height: 300px; overflow-y: auto; z-index: 20; }
    .ditem { display: block; width: 100%; text-align: left; padding: 9px 14px; background: none; border: none; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
    .ditem:hover { background: #fff7ed; }
    .ditem-name { font-weight: 600; color: #1f2937; font-size: 14px; }
    .ditem-sub { font-size: 12px; color: #6b7280; }

    /* Banner */
    .banner { margin-top: 14px; padding: 12px 14px; background: linear-gradient(90deg,#f0fdf4,#dcfce7); border-radius: 8px; border-left: 4px solid #16a34a; }
    .banner-city { font-weight: 800; font-size: 15px; color: #111; margin: 0 0 3px; }
    .banner-sub { font-size: 12px; color: #4b5563; margin: 0; }

    /* Alert panel */
    .alert-panel { background: linear-gradient(135deg,#f0fdf4,#dcfce7); border: 2px solid #4ade80; border-radius: 12px; padding: 16px 18px; margin-bottom: 18px; }
    .alert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 10px; margin-top: 12px; }
    .acard { background: #fff; border-radius: 8px; padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display: flex; gap: 8px; align-items: flex-start; }
    .acard-hot { border-left: 4px solid #ef4444; }
    .acard-nothot { border-left: 4px solid #0d9488; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-bottom: 18px; font-size: 12px; }
    .leg-item { display: flex; align-items: center; gap: 5px; }
    .leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* ── CALENDAR: desktop = 7-col grid, mobile = list ── */
    .cal-day-headers { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 6px; }
    .cal-day-header { text-align: center; font-weight: 700; font-size: 11px; color: #4b5563; padding: 4px 0; }
    .cal-weeks { display: flex; flex-direction: column; gap: 5px; }
    .cal-week { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }

    /* Desktop cell */
    .day-cell {
      aspect-ratio: 1;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      padding: 3px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      overflow: hidden;
      min-width: 0;
    }
    .day-cell .date-label { position: absolute; top: 2px; right: 3px; font-size: 8px; font-weight: 600; color: #6b7280; line-height: 1; }
    .day-cell .dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 2px; flex-shrink: 0; }
    .day-cell .temp-val { font-size: 10px; font-weight: 800; color: #1f2937; line-height: 1.1; }
    .day-cell .coll-label { font-size: 6.5px; font-weight: 700; text-align: center; line-height: 1.15; margin-top: 1px; }
    .day-cell .no-coll { font-size: 6.5px; color: #374151; text-align: center; line-height: 1.1; }
    .day-cell .x-mark { font-size: 13px; font-weight: 800; color: #111; line-height: 1; }
    .day-cell .today-badge { position: absolute; top: -5px; right: -3px; background: #16a34a; color: #fff; font-size: 6px; font-weight: 800; padding: 1px 4px; border-radius: 7px; white-space: nowrap; }
    .ring-hot { box-shadow: 0 0 0 3px #fb923c; }
    .ring-nothot { box-shadow: 0 0 0 3px #0d9488; }
    .ring-today { box-shadow: 0 0 0 3px #111; }
    .faded { opacity: 0.4; }

    /* ── MOBILE: keep grid but give cells more breathing room ── */
    @media (max-width: 540px) {
      .wrap { padding: 8px; }
      .cal-weeks { gap: 3px; }
      .cal-week { gap: 3px; }
      .day-cell {
        aspect-ratio: unset;
        min-height: 64px;
        padding: 4px 2px 3px;
        border-radius: 6px;
      }
      .day-cell .date-label { font-size: 7px; right: 2px; top: 2px; }
      .day-cell .dot { width: 7px; height: 7px; }
      .day-cell .temp-val { font-size: 9px; }
      .day-cell .coll-label { font-size: 6px; }
      .day-cell .no-coll { font-size: 6px; }
      .day-cell .x-mark { font-size: 11px; }
      .day-cell .today-badge { font-size: 5px; padding: 1px 3px; top: -4px; right: -2px; }
    }
  </style>
</head>

// ── Logic ──────────────────────────────────────────────────────────────────────

function getRequiredWashout(temps, i, blue) {
  var spikeEnd = -1;
  for (var j = i-1; j >= 0; j--) { if (temps[j] > blue) { spikeEnd = j; break; } }
  if (spikeEnd === -1) return 0;
  var spikeStart = spikeEnd;
  while (spikeStart > 0 && temps[spikeStart-1] > blue) spikeStart--;
  var len = spikeEnd - spikeStart + 1;
  return len === 1 ? 2 : len === 2 ? 4 : 7;
}

function findWindows(weatherData, city) {
  if (!weatherData || !city) return [];
  var temps = weatherData.daily.temperature_2m_max;
  var dates = weatherData.daily.time;
  var cutoff = city.cutoff;
  var blue = city.blue; // upper bound for NotHot window
  var windows = [];
  var washouts = [];

  // Hot windows: trigger on 2 consecutive days >= cutoff, collect from day 3+
  for (var i = 0; i < temps.length - 2; i++) {
    if (temps[i] >= cutoff && temps[i+1] >= cutoff) {
      var ws = i+2;
      if (ws >= temps.length || temps[ws] < cutoff) continue;
      var we = ws;
      while (we+1 < temps.length && temps[we+1] >= cutoff) we++;
      windows.push({type:'Hot', collectionStart:dates[ws], collectionEnd:dates[we], collectionDays:we-ws+1});
      i = we;
    }
  }

  // 14-day washout after any hot run
  for (var i = 0; i < temps.length; i++) {
    if (temps[i] >= cutoff) {
      var runEnd = i;
      while (runEnd+1 < temps.length && temps[runEnd+1] >= cutoff) runEnd++;
      var ed = new Date(dates[runEnd]); ed.setHours(0,0,0,0);
      var ws2 = new Date(ed); ws2.setDate(ws2.getDate()+1);
      var we2 = new Date(ed); we2.setDate(we2.getDate()+14);
      washouts.push({start:ws2, end:we2});
      i = runEnd;
    }
  }

  function inWashout(idx) {
    var d = new Date(dates[idx]); d.setHours(0,0,0,0);
    return washouts.some(function(p){ return d >= p.start && d <= p.end; });
  }

  // NotHot windows: 15°C to city.blue (upper bound), after washout
  for (var i = 0; i < temps.length; i++) {
    if (temps[i] >= 15 && temps[i] <= blue) {
      if (inWashout(i)) continue;
      var rw = getRequiredWashout(temps, i, blue);
      var valid = false;
      if (rw === 0) {
        valid = true;
      } else {
        var spikeEnd = -1;
        for (var j = i-1; j >= 0; j--) { if (temps[j] > blue) { spikeEnd = j; break; } }
        valid = (i - spikeEnd - 1) >= rw;
      }
      if (valid) {
        var we = i;
        while (we+1 < temps.length && temps[we+1] >= 15 && temps[we+1] <= blue && !inWashout(we+1)) we++;
        var inHot = windows.some(function(w){
          return w.type==='Hot' && new Date(dates[i]) >= new Date(w.collectionStart) && new Date(dates[i]) <= new Date(w.collectionEnd);
        });
        if (!inHot) {
          windows.push({type:'NotHot', collectionStart:dates[i], collectionEnd:dates[we], collectionDays:we-i+1});
          i = we;
        }
      }
    }
  }
  return windows.sort(function(a,b){ return new Date(a.collectionStart)-new Date(b.collectionStart); });
}

// ── Colour helpers ─────────────────────────────────────────────────────────────

function tempBg(t, cutoff, blue) {
  if (t==null) return '#d1d5db';
  if (t > cutoff) return '#ef4444';
  if (t >= 15 && t <= blue) return '#0d9488';
  if (t < 15) return '#bfdbfe';
  return '#fde047';
}
function tempBorder(t, cutoff, blue) {
  if (t==null) return '#9ca3af';
  if (t > cutoff) return '#dc2626';
  if (t >= 15 && t <= blue) return '#0f766e';
  if (t < 15) return '#93c5fd';
  return '#facc15';
}

var ML = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function fmtL(s){ var d=new Date(s); return ML[d.getMonth()]+' '+d.getDate(); }
function fmtS(s){ var d=new Date(s); return MS[d.getMonth()]+' '+d.getDate(); }
function fmtFull(s){
  var d=new Date(s);
  var dow=d.getDay(); var adj=dow===0?6:dow-1;
  return DAY_NAMES[adj]+' '+MS[d.getMonth()]+' '+d.getDate();
}
function isToday(s){ var t=new Date(); t.setHours(0,0,0,0); var d=new Date(s); d.setHours(0,0,0,0); return d.getTime()===t.getTime(); }
function isFuture(s){ var t=new Date(); t.setDate(t.getDate()+1); t.setHours(0,0,0,0); var d=new Date(s); d.setHours(0,0,0,0); return d>=t; }

// ── App ────────────────────────────────────────────────────────────────────────

function App() {
  var _c=useState(null), city=_c[0], setCity=_c[1];
  var _q=useState(''), q=_q[0], setQ=_q[1];
  var _w=useState(null), wx=_w[0], setWx=_w[1];
  var _l=useState(false), loading=_l[0], setLoading=_l[1];
  var _e=useState(null), err=_e[0], setErr=_e[1];

  var filtered = CITIES.filter(function(c){
    return c.name.toLowerCase().indexOf(q.toLowerCase())>=0 ||
           c.country.toLowerCase().indexOf(q.toLowerCase())>=0;
  });

  function pickCity(c) {
    setCity(c); setQ(''); setWx(null); setLoading(true); setErr(null);
    var url='https://api.open-meteo.com/v1/forecast?latitude='+c.lat+'&longitude='+c.lon+'&daily=temperature_2m_max&temperature_unit=celsius&timezone=auto&past_days=14&forecast_days=16';
    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){ setWx(d); })
      .catch(function(e){ setErr(e.message); })
      .finally(function(){ setLoading(false); });
  }

  var allWin = findWindows(wx, city);

  function typesForDate(dateStr) {
    var d=new Date(dateStr); d.setHours(0,0,0,0);
    return allWin.filter(function(w){
      var s=new Date(w.collectionStart); s.setHours(0,0,0,0);
      var e=new Date(w.collectionEnd); e.setHours(0,0,0,0);
      return d>=s && d<=e;
    }).map(function(w){ return w.type; });
  }

  // Build flat day list (last 19 days)
  function buildDays() {
    if (!wx) return [];
    var times=wx.daily.time, temps=wx.daily.temperature_2m_max;
    var si=Math.max(0,times.length-19);
    var days=[];
    for (var i=si;i<times.length;i++) {
      var dow=new Date(times[i]).getDay();
      days.push({date:times[i], temp:temps[i], dow:dow===0?6:dow-1});
    }
    return days;
  }

  // Build weekly grid (for desktop)
  function buildWeeks(days) {
    if (!days.length) return [];
    var weeks=[], week=[];
    for (var i=0;i<days[0].dow;i++) week.push(null);
    days.forEach(function(day,idx){
      week.push(day);
      if (day.dow===6||idx===days.length-1){ weeks.push(week); week=[]; }
    });
    return weeks;
  }

  var days = buildDays();
  var weeks = buildWeeks(days);

  var tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  var dispEnd=wx?new Date(wx.daily.time[wx.daily.time.length-1]):null;
  var dispStart=wx?new Date(wx.daily.time[Math.max(0,wx.daily.time.length-19)]):null;
  var alertWin=allWin.filter(function(w){
    if(!dispStart||!dispEnd) return false;
    var ws=new Date(w.collectionStart), we=new Date(w.collectionEnd);
    return we>=tomorrow&&ws<=dispEnd&&we>=dispStart&&w.collectionDays>=2;
  });

  // Render a single day cell (shared between grid and list)
  function renderDay(day, extraClass) {
    if (!day) return h('div',{className:'day-cell-empty'});
    var t=day.temp, noData=t==null, cut=city.cutoff, bl=city.blue;
    var tod=isToday(day.date), fut=isFuture(day.date);
    var types=fut?typesForDate(day.date):[];
    var noCollect=fut&&!noData&&types.length===0;
    var border=tempBorder(t,cut,bl);

    var ringClass='';
    if (tod) ringClass='ring-today';
    else if (types.indexOf('Hot')>=0) ringClass='ring-hot';
    else if (types.indexOf('NotHot')>=0) ringClass='ring-nothot';

    var cls='day-cell'+(noData?' faded':'')+(ringClass?' '+ringClass:'')+(extraClass?' '+extraClass:'');

    return h('div',{key:day.date, className:cls, style:{borderColor:border}},
      h('div',{className:'date-label'}, fmtFull(day.date)),
      noData
        ? h('span',{style:{fontSize:'9px',color:'#9ca3af'}},'No data')
        : h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'1px',marginTop:'8px'}},
            h('div',{className:'dot',style:{background:tempBg(t,cut,bl)}}),
            h('div',{className:'temp-val'}, t.toFixed(1)+'°'),
            types.indexOf('Hot')>=0 && h('div',{className:'coll-label',style:{color:'#b91c1c'}},'collect Hot'),
            types.indexOf('NotHot')>=0 && h('div',{className:'coll-label',style:{color:'#0f766e'}},'collect Not-Hot'),
            noCollect && h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
              h('div',{className:'no-coll'},'NO collect'),
              h('div',{className:'x-mark'},'✕')
            )
          ),
      tod && h('div',{className:'today-badge'},'TODAY')
    );
  }

  return h('div',{className:'wrap'},

    // Header
    h('div',{className:'card card-top'},
      h('div',{className:'title-row'},
        h('span',{style:{fontSize:'26px'}},'🔥'),
        h('div',null,
          h('h1',null,'HeatCog Data Collection Alert'),
          h('p',{className:'sub'},'Track HOT and NOT-HOT data collection windows')
        )
      ),

      // Search
      h('div',{style:{position:'relative'}},
        h('div',{className:'search-box'},
          h('span',{style:{color:'#9ca3af'}},'🔍'),
          h('input',{type:'text',placeholder:'Search city or country…',value:q,onChange:function(ev){setQ(ev.target.value);}})
        ),
        q && h('div',{className:'dropdown'},
          filtered.length===0
            ? h('div',{style:{padding:'10px 14px',color:'#6b7280'}},'No cities found')
            : filtered.map(function(c){
                return h('button',{key:c.name+c.country,className:'ditem',onClick:function(){pickCity(c);}},
                  h('div',{className:'ditem-name'},c.name),
                  h('div',{className:'ditem-sub'},c.country+' · Cutoff: '+c.cutoff+'°C · NotHot: 15–'+c.blue+'°C')
                );
              })
        )
      ),

      // City banner
      city && h('div',{className:'banner'},
        h('p',{className:'banner-city'},city.name+', '+city.country),
        h('p',{className:'banner-sub'},
          'Hot threshold: ',h('b',{style:{color:'#dc2626'}},city.cutoff+'°C'),
          ' · NotHot window: ',h('b',{style:{color:'#0f766e'}},'15–'+city.blue+'°C'),
          ' · 🔥 2+ days above cutoff to trigger · ☁️ washout: 1/2/3+ spike → 2/4/7 days · 14-day post-hot washout'
        )
      )
    ),

    // Loading
    loading && h('div',{className:'card',style:{textAlign:'center',color:'#6b7280',fontSize:'17px',padding:'40px'}},'Loading weather data…'),

    // Error
    err && h('div',{style:{background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:'12px',padding:'16px',color:'#b91c1c',marginBottom:'16px'}},
      h('b',null,'Error: '),err),

    // Content
    wx && city && !loading && h('div',null,

      // Alert panel
      alertWin.length>0 && h('div',{className:'alert-panel'},
        h('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start'}},
          h('span',{style:{fontSize:'22px',marginTop:'2px'}},'🚨'),
          h('div',{style:{flex:1}},
            h('h2',{style:{marginBottom:'12px'}},'Active Data Collection Window'+(alertWin.length>1?'s':'')),
            h('div',{className:'alert-grid'},
              alertWin.map(function(w,i){
                return h('div',{key:i,className:'acard '+(w.type==='Hot'?'acard-hot':'acard-nothot')},
                  h('span',{style:{fontSize:'18px'}},w.type==='Hot'?'🔥📊':'☁️📊'),
                  h('div',null,
                    h('div',{style:{fontWeight:'bold',fontSize:'13px',color:'#111'}},(w.type==='Hot'?'Hot':'Not-Hot')+' Collection'),
                    h('div',{style:{fontSize:'13px',fontWeight:600,color:'#374151'}},fmtL(w.collectionStart)+' – '+fmtL(w.collectionEnd)),
                    h('div',{style:{fontSize:'11px',color:'#6b7280'}},w.collectionDays+' day'+(w.collectionDays>1?'s':''))
                  )
                );
              })
            )
          )
        )
      ),

      // Calendar card
      h('div',{className:'card'},
        h('h2',null,'15-Day Temperature Forecast'),

        // Legend
        h('div',{className:'legend'},
          [['#bfdbfe','Cold <15°C — no collect'],
           ['#0d9488','Not-Hot 15–'+city.blue+'°C — collect ☁️'],
           ['#fde047','Warm '+city.blue+'–'+city.cutoff+'°C — no collect'],
           ['#ef4444','Hot >'+city.cutoff+'°C — collect 🔥'],
           ['#d1d5db','No data']].map(function(p){
            return h('div',{key:p[1],className:'leg-item'},
              h('div',{className:'leg-dot',style:{background:p[0]}}),
              h('span',null,p[1]));
          })
        ),

        // Desktop: 7-col calendar grid (hidden on mobile via CSS)
        h('div',{className:'cal-day-headers'},
          DAY_NAMES.map(function(d){ return h('div',{key:d,className:'cal-day-header'},d); })
        ),
        h('div',{className:'cal-weeks'},
          weeks.map(function(week,wi){
            return h('div',{key:wi,className:'cal-week'},
              week.map(function(day,di){
                if (!day) return h('div',{key:'e'+di,className:'day-cell-empty'});
                return renderDay(day, null);
              })
            );
          })
        )
      )
    ),

    // Empty state
    !city && !loading && h('div',{className:'card',style:{textAlign:'center',color:'#6b7280',padding:'48px'}},
      h('div',{style:{fontSize:'44px',marginBottom:'12px'}},'🔥'),
      h('p',{style:{fontSize:'17px',margin:'0 0 6px'}},'Select a city to monitor heat events'),
      h('p',{style:{fontSize:'13px',color:'#9ca3af',margin:0}},CITIES.length+' cities available worldwide')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>

</body>
</html>
